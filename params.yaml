seed: 42

data:
  # null uses the full dataset; set an integer for a faster dev loop
  sample_size: null

split:
  val_fraction: 0.15
  test_fraction: 0.15

select_v:
  # drop a V column missing in more than this fraction of training rows
  max_missing_fraction: 0.9
  # cluster V columns whose |Spearman| meets this; keep one representative each
  correlation_threshold: 0.85
  max_features: 30
  # rows sampled (seeded) for the Spearman computation
  corr_sample_rows: 100000

training:
  candidate_alias: candidate
  recall_at_k_levels: [0.005, 0.01, 0.05]
  optuna:
    n_trials: 30
    timeout_seconds: 1800
  shap:
    sample_size: 2000

evaluation:
  champion_alias: champion
  calibration:
    method: isotonic
  cost_matrix:
    fn_cost_usd: 100.0
    fp_cost_usd: 5.0
  threshold:
    recall_floor: 0.1
    alert_volume_budget: 0.1
  gate:
    auprc_tolerance: 0.0
    cost_tolerance: 0.0

monitoring:
  # PSI above this on any model-input feature is a meaningful population shift
  psi_threshold: 0.2
  # rolling AUPRC below this signals concept drift / performance decay
  auprc_floor: 0.05
  # consecutive breach recompute cycles before a drift-alert is published
  drift_debounce_cycles: 3
  window_size: 5000
  join_retention: 20000
  recompute_interval_seconds: 15.0
  min_matched_for_auprc: 200
  min_current_for_drift: 500

retraining:
  deployment_name: argus-retraining/argus-retraining
  cron: "0 3 * * 1"
  # back-to-back drift alerts inside this window collapse into one retrain
  cooldown_seconds: 3600.0
  n_trials: 30
  timeout_seconds: 1800

canary:
  # traffic share handed to the candidate at each ramp step
  traffic_steps: [0.05, 0.25, 1.0]
  max_p99_latency_ms: 50.0
  max_error_rate: 0.001
  min_auprc_ratio: 0.98
  min_agreement: 0.95
  min_samples: 500
  max_holds_per_step: 3
