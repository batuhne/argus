apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving
  labels:
    app: argus-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-serving
  template:
    metadata:
      labels:
        app: argus-serving
        argus.io/app: serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: argus-serving
      # preStop sleeps long enough for the endpoints controller to pull this pod before SIGTERM,
      # so traffic stops arriving while in-flight requests finish (zero-drop drain). The grace
      # period covers the sleep plus the server's own shutdown.
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Prefer spreading replicas across nodes, but soft (ScheduleAnyway): best-effort, not a
      # guarantee, so both can still co-locate and a single-node cluster still schedules.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: argus-serving
      containers:
        - name: serving
          image: argus-app
          # Kustomization pins argus-app by digest, so the ref is immutable and never needs re-pull.
          imagePullPolicy: IfNotPresent
          args:
            - bentoml
            - serve
            - src/fraud/serving/service.py:FraudService
            - --host=0.0.0.0
            - --port=3001
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: argus-serving-env
            - secretRef:
                name: argus-serving-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          # The server binds only after a blocking champion load, so shield liveness until then.
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["python", "-c", "import time; time.sleep(5)"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
