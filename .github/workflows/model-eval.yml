name: model-eval

on:
  pull_request:
    paths:
      - "src/fraud/training/**"
      - "src/fraud/evaluation/**"
      - "src/fraud/serving/**"
      - "src/fraud/features/**"
      - "src/fraud/transforms/**"
      - "feature_repo/**"
      - "tests/model/**"
  workflow_dispatch:

concurrency:
  group: model-eval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  model-gate:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.11"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      # Trains challenger on synthetic splits, exercises the promotion gate, and
      # asserts offline/online feature parity against the Redis service.
      - name: Model gate and training-serving skew
        run: uv run pytest -m integration tests/model
