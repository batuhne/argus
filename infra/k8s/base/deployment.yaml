apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving
  labels:
    app: argus-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-serving
  template:
    metadata:
      labels:
        app: argus-serving
        argus.io/app: serving
    spec:
      serviceAccountName: argus-serving
      # preStop sleeps long enough for the endpoints controller to pull this pod before SIGTERM,
      # so traffic stops arriving while in-flight requests finish (zero-drop drain). The grace
      # period covers the sleep plus the server's own shutdown.
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Spread replicas across nodes so one node loss cannot take serving to zero. Soft, so a
      # single-node cluster still schedules.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: argus-serving
      containers:
        - name: serving
          image: argus-app
          args:
            - bentoml
            - serve
            - src/fraud/serving/service.py:FraudService
            - --host=0.0.0.0
            - --port=3001
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: argus-serving-env
            - secretRef:
                name: argus-serving-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["python", "-c", "import time; time.sleep(5)"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
