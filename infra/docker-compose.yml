name: argus

# Local infrastructure stack. Every service is arm64 compatible and exposes a
# healthcheck so "make up" can block until the stack is actually ready. Image
# tags are pinned for reproducibility.
#
# Single Redpanda broker (RF=1), enough for a laptop or CI. docker-compose.multi.yml adds
# two more brokers at RF=3; "make up" applies both, "make up-single" uses this file alone.

x-restart: &restart
  restart: unless-stopped

networks:
  argus:
    name: argus

volumes:
  postgres-data:
  redis-data:
  redpanda-0-data:
  minio-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:

services:
  postgres:
    <<: *restart
    image: postgres:16-alpine
    networks: [argus]
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    <<: *restart
    image: redis:7-alpine
    networks: [argus]
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda-0:
    <<: *restart
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    networks: [argus]
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda-0:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda-0:33145
      - --advertise-rpc-addr=redpanda-0:33145
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda-0-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Creates the topics up front so clients don't auto-create them at RF=1. RF and partitions
  # come from the env; the overlay raises RF to 3. Fails loudly if a topic already exists at
  # the wrong RF, the trap when single- and multi-broker runs share volumes.
  redpanda-init:
    profiles: ["app"]
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    networks: [argus]
    depends_on:
      redpanda-0:
        condition: service_healthy
    environment:
      REDPANDA_BROKERS: redpanda-0:9092
      REDPANDA_RF: "1"
      REDPANDA_PARTITIONS: "6"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        existing="$$(rpk topic list -X brokers="$$REDPANDA_BROKERS" 2>/dev/null | tail -n +2)"
        for t in transactions predictions scored-features labels drift-alerts transactions-dlq; do
          rf="$$(echo "$$existing" | awk -v t="$$t" '$$1==t {print $$3}')"
          if [ -n "$$rf" ]; then
            if [ "$$rf" != "$$REDPANDA_RF" ]; then
              echo "topic $$t exists at RF $$rf, expected $$REDPANDA_RF; run 'make down -v' to reset" >&2
              exit 1
            fi
            echo "topic $$t exists at RF $$REDPANDA_RF"
          else
            rpk topic create "$$t" -X brokers="$$REDPANDA_BROKERS" -r "$$REDPANDA_RF" -p "$$REDPANDA_PARTITIONS"
          fi
        done
    restart: "no"

  minio:
    <<: *restart
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    networks: [argus]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    networks: [argus]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/mlflow
    restart: "no"

  mlflow:
    <<: *restart
    build:
      context: ./docker
      dockerfile: mlflow.Dockerfile
    networks: [argus]
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    command:
      - mlflow
      - server
      - --backend-store-uri=postgresql://argus:argus@postgres:5432/mlflow
      - --serve-artifacts
      - --artifacts-destination=s3://mlflow
      - --host=0.0.0.0
      - --port=5000
    # Host 5000 is held by the macOS AirPlay receiver, so expose 5500.
    ports:
      - "5500:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  prometheus:
    <<: *restart
    image: prom/prometheus:v2.55.1
    networks: [argus]
    # Resolves the host-run retrain bridge target; Docker Desktop maps this automatically, Linux
    # needs the explicit host-gateway alias.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    <<: *restart
    image: grafana/grafana:11.4.0
    networks: [argus]
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  alertmanager:
    <<: *restart
    image: prom/alertmanager:v0.27.0
    networks: [argus]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  # The serving and monitoring apps need a trained champion, so they sit behind
  # the "app" profile and start after the model is in the registry.
  serving:
    <<: *restart
    profiles: ["app"]
    build:
      context: ..
      dockerfile: infra/docker/app.Dockerfile
    networks: [argus]
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ARGUS_REDIS_CONNECTION: redis:6379
      SERVING_API_KEY: ${SERVING_API_KEY:-argus-local-dev-key}
    command:
      - bentoml
      - serve
      - src/fraud/serving/service.py:FraudService
      - --host=0.0.0.0
      - --port=3001
    volumes:
      - ../feature_repo:/app/feature_repo:ro
    ports:
      - "3001:3001"

  # Single replica: the join and PSI windows are in memory, so a second instance would split
  # them across partitions. Scaling it needs that state in a shared store first.
  monitoring:
    <<: *restart
    profiles: ["app"]
    build:
      context: ..
      dockerfile: infra/docker/app.Dockerfile
    networks: [argus]
    depends_on:
      mlflow:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092
    command: ["python", "-m", "fraud.monitoring.exporter"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/metrics').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Scales out: replicas in the group split the partitions, and card_id keying keeps a card's
  # events on one partition and in order. Reaches serving by name, which round-robins replicas.
  consumer:
    <<: *restart
    profiles: ["app"]
    build:
      context: ..
      dockerfile: infra/docker/app.Dockerfile
    networks: [argus]
    deploy:
      replicas: 3
    depends_on:
      serving:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda-0:9092
      SERVING_PREDICT_URL: http://serving:3001/predict
      SERVING_API_KEY: ${SERVING_API_KEY:-argus-local-dev-key}
    command: ["python", "-m", "fraud.ingestion.consumer"]
    # The image healthcheck probes serving readiness, which the consumer lacks.
    healthcheck:
      disable: true
