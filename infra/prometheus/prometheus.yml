global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Serving and monitoring report down until the "app" profile is started.
  - job_name: argus-serving
    static_configs:
      - targets: ["serving:3001"]

  - job_name: argus-monitoring
    static_configs:
      - targets: ["monitoring:8000"]

  # The retrain bridge runs on the host (it needs the Prefect client, which the slim image omits),
  # so it is reached over the Docker host gateway. Down until `make retrain-trigger` is running.
  - job_name: argus-retrain-trigger
    static_configs:
      - targets: ["host.docker.internal:8002"]
