# Default-deny everything, then allow only what serving needs. The data plane
# (Redis, Redpanda, MLflow, MinIO) is addressed by port here; in a real cluster
# tighten the egress peers to namespace or pod selectors.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: serving-allow
spec:
  podSelector:
    matchLabels:
      argus.io/app: serving
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Only the ingress controller (Traefik, in kube-system on k3d) reaches the predict port,
    # fronting both live and mirrored traffic. NOT probe-safe under a policy-enforcing CNI
    # (Calico, Cilium): kubelet livez/readyz come from the node, so those clusters must add a
    # node-CIDR ipBlock for port 3001. The bearer token gates predict regardless.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 9000
