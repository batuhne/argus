# Consumes the transaction stream and calls /predict with the bearer token from argus-serving-secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  labels:
    app: argus-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-consumer
  template:
    metadata:
      labels:
        app: argus-consumer
        argus.io/app: consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: argus-consumer
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: argus-consumer
      containers:
        - name: consumer
          image: argus-app
          imagePullPolicy: IfNotPresent
          args:
            - python
            - -m
            - fraud.ingestion.consumer
          ports:
            - name: metrics
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: argus-serving-env
            - secretRef:
                name: argus-serving-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # No HTTP server; liveness checks the heartbeat the loop refreshes each poll, so a hung
          # poll is restarted while an intentional backoff keeps heartbeating.
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os,sys,time; sys.exit(0 if time.time()-os.path.getmtime('/tmp/consumer-alive')<60 else 1)"
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
