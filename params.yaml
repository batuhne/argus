seed: 42

data:
  # null uses the full dataset; set an integer for a faster dev loop
  sample_size: null

split:
  val_fraction: 0.15
  test_fraction: 0.15

training:
  candidate_alias: candidate
  recall_at_k_levels: [0.005, 0.01, 0.05]
  optuna:
    n_trials: 30
    timeout_seconds: 1800
  shap:
    sample_size: 2000

evaluation:
  champion_alias: champion
  calibration:
    method: isotonic
  cost_matrix:
    fn_cost_usd: 100.0
    fp_cost_usd: 5.0
  threshold:
    recall_floor: 0.1
    alert_volume_budget: 0.1
  gate:
    auprc_tolerance: 0.0
    cost_tolerance: 0.0
