name: promote

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Immutable tag that passed canary, e.g. sha-abc1234 (not the floating candidate)"
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote the source image to stable by digest
        env:
          SOURCE: ${{ inputs.source }}
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE:$SOURCE" --format '{{json .Manifest.Digest}}' | tr -d '"')
          docker buildx imagetools create -t "$IMAGE:stable" "$IMAGE@$digest"
          echo "Promoted $IMAGE:$SOURCE ($digest) to :stable" >> "$GITHUB_STEP_SUMMARY"
