# Keep at least one replica of each scalable workload during voluntary disruptions
# (node drains, upgrades) so a maintenance window cannot take serving to zero.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: serving
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: argus-serving
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: consumer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: argus-consumer
