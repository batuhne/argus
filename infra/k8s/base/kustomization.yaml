apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argus

labels:
  - pairs:
      app.kubernetes.io/part-of: argus
    includeSelectors: false

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - consumer-deployment.yaml
  - service.yaml
  - hpa.yaml
  - networkpolicy.yaml

# The registry path lives here; overlays override only the tag for their candidate.
images:
  - name: argus-app
    newName: ghcr.io/batuhne/argus
    newTag: stable
