stages:
  download:
    cmd: PYTHONPATH=src python -m fraud.ingestion.download
    deps:
      - src/fraud/ingestion/download.py
    outs:
      - data/raw/train_transaction.csv
      - data/raw/train_identity.csv

  validate:
    cmd: PYTHONPATH=src python -m fraud.validation.validate
    deps:
      - src/fraud/validation/validate.py
      - src/fraud/validation/schemas.py
      - data/raw/train_transaction.csv
      - data/raw/train_identity.csv
    outs:
      - reports/validation_report.json:
          cache: false

  clean:
    cmd: PYTHONPATH=src python -m fraud.data.clean
    deps:
      - src/fraud/data/clean.py
      - data/raw/train_transaction.csv
      - data/raw/train_identity.csv
    params:
      - seed
      - data.sample_size
    outs:
      - data/interim/clean.parquet

  split:
    cmd: PYTHONPATH=src python -m fraud.data.split
    deps:
      - src/fraud/data/split.py
      - data/interim/clean.parquet
    params:
      - split.val_fraction
      - split.test_fraction
      - split.holdout_fraction
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - data/processed/holdout.parquet

  select_v:
    cmd: PYTHONPATH=src python -m fraud.features.select_v
    deps:
      - src/fraud/features/select_v.py
      - src/fraud/transforms/feature_logic.py
      - data/processed/train.parquet
    params:
      - seed
      - select_v.max_missing_fraction
      - select_v.correlation_threshold
      - select_v.max_features
      - select_v.corr_sample_rows
    outs:
      - feature_repo/v_selected.json:
          cache: false

  features:
    cmd: PYTHONPATH=src python -m fraud.features.build_offline
    deps:
      - src/fraud/features/build_offline.py
      - src/fraud/transforms/feature_logic.py
      - data/interim/clean.parquet
    outs:
      - feature_repo/data/card_features.parquet

  train:
    cmd: PYTHONPATH=src python -m fraud.training.train
    deps:
      - src/fraud/training
      - src/fraud/transforms
      - src/fraud/evaluation
      - src/fraud/common
      - feature_repo/v_selected.json
      - feature_repo/data/card_features.parquet
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
    params:
      - training
      - evaluation
    outs:
      - artifacts/last_run.json:
          cache: false

  backtest:
    cmd: PYTHONPATH=src python -m fraud.evaluation.backtest
    deps:
      - src/fraud/evaluation
      - src/fraud/serving
      - src/fraud/training
      - src/fraud/transforms
      - src/fraud/common
      - feature_repo/v_selected.json
      - feature_repo/data/card_features.parquet
      - data/processed/holdout.parquet
      # re-run after a training run may have promoted a new champion
      - artifacts/last_run.json
    params:
      - evaluation
    outs:
      - artifacts/backtest.json:
          cache: false
