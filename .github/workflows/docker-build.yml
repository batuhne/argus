name: docker-build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing via GitHub OIDC

env:
  IMAGE: ghcr.io/${{ github.repository }}
  SCAN_TAG: argus-app:scan

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=raw,value=candidate,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - name: Build image once for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/docker/app.Dockerfile
          load: true
          tags: ${{ env.SCAN_TAG }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for fixable vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Push the scanned image
        id: push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$SCAN_TAG" "$tag"
            docker push "$tag"
          done <<< "$TAGS"
          first=$(printf '%s\n' "$TAGS" | head -n1)
          digest=$(docker inspect --format '{{index .RepoDigests 0}}' "$first")
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Pushed scanned image: $digest" >> "$GITHUB_STEP_SUMMARY"
      - name: Generate the image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.SCAN_TAG }}
          scan-type: image
          format: spdx-json
          output: sbom.spdx.json
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the image and attest its SBOM
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "$DIGEST"
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "$DIGEST"
