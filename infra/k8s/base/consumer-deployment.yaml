# Consumes the transaction stream and calls /predict with the bearer token from argus-serving-secrets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  labels:
    app: argus-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: argus-consumer
  template:
    metadata:
      labels:
        app: argus-consumer
        argus.io/app: consumer
    spec:
      serviceAccountName: argus-consumer
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: consumer
          image: argus-app
          args:
            - python
            - -m
            - fraud.ingestion.consumer
          envFrom:
            - configMapRef:
                name: argus-serving-env
            - secretRef:
                name: argus-serving-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # No HTTP server, so no probes.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
