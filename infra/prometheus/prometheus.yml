global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The serving service exposes metrics once it is running. Declared up front so
  # the scrape config stays stable; it reports down until the service is up.
  - job_name: argus-serving
    static_configs:
      - targets: ["serving:3001"]
