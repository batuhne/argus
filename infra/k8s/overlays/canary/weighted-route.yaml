# Weighted split between stable and canary at the first ramp step (5%). serving/canary.py decides
# promote/hold/rollback per step; a human patches the next weight here (no in-cluster controller drives it).
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: serving-weighted
spec:
  weighted:
    services:
      - name: serving
        port: 80
        weight: 95
      - name: serving-canary
        port: 80
        weight: 5
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: serving
spec:
  entryPoints: ["web"]
  routes:
    - match: Host(`argus.localhost`)
      kind: Rule
      services:
        - name: serving-weighted
          kind: TraefikService
