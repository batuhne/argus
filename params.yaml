seed: 42

data:
  # null uses the full dataset; set an integer for a faster dev loop
  sample_size: null

split:
  val_fraction: 0.15
  test_fraction: 0.15
  # latest window, never seen by tuning/threshold/gate; at 0.15 train is the remaining 0.55
  holdout_fraction: 0.15

select_v:
  # drop a V column missing in more than this fraction of training rows
  max_missing_fraction: 0.9
  # cluster V columns whose |Spearman| meets this; keep one representative each
  correlation_threshold: 0.85
  max_features: 30
  # rows sampled (seeded) for the Spearman computation
  corr_sample_rows: 100000

training:
  candidate_alias: candidate
  optuna:
    n_trials: 50
    timeout_seconds: 3600
  encoder:
    # pulls rare-category target means toward the global prior
    smoothing: 20.0
    # out-of-fold splits for leak-free target encoding on the train matrix
    n_splits: 5
  shap:
    sample_size: 2000

evaluation:
  champion_alias: champion
  # top-k alert fractions for recall, shared by training and backtest
  recall_at_k_levels: [0.005, 0.01, 0.05]
  calibration:
    method: isotonic
  cost_matrix:
    fn_cost_usd: 100.0
    fp_cost_usd: 5.0
  threshold:
    recall_floor: 0.1
    alert_volume_budget: 0.1
  gate:
    auprc_tolerance: 0.0
    cost_tolerance: 0.0

monitoring:
  # PSI above this on any model-input feature is a meaningful population shift
  psi_threshold: 0.2
  # cap per-feature PSI series at the worst N to bound Prometheus cardinality
  psi_top_n: 15
  # rolling AUPRC below this triggers a retrain; set under the holdout backtest, with
  # debounce and cooldown absorbing single-window variance so only sustained decay fires
  auprc_floor: 0.30
  # consecutive breach recompute cycles before a drift-alert is published
  drift_debounce_cycles: 3
  window_size: 5000
  # seconds a score stays joinable (above the ~360s warped label lag); also the restart-replay window
  retention_seconds: 1800.0
  recompute_interval_seconds: 15.0
  min_matched_for_auprc: 200
  min_current_for_drift: 500
  # reject a publish timestamp more than this far ahead of wall clock, so one skewed
  # producer clock cannot jump the join window and evict live pending scores
  max_clock_skew_seconds: 300.0
  # hard cap on in-flight tracked transaction ids, a memory backstop if the event clock
  # ever stalls; retention_seconds eviction is the primary bound
  max_tracked_ids: 200000

retraining:
  deployment_name: argus-retraining/argus-retraining
  cron: "0 3 * * 1"
  # back-to-back drift alerts inside this window collapse into one retrain
  cooldown_seconds: 3600.0
  n_trials: 30
  timeout_seconds: 1800

canary:
  # traffic share handed to the candidate at each ramp step
  traffic_steps: [0.05, 0.25, 1.0]
  max_p99_latency_ms: 50.0
  max_error_rate: 0.001
  min_auprc_ratio: 0.98
  min_agreement: 0.95
  min_samples: 500
  # holds at full traffic wait for a labeled AUPRC, so keep this above the label-lag horizon
  max_holds_per_step: 3

stream:
  # dataset-seconds replayed per real second; compresses the holdout and divides the lag
  time_warp_factor: 2000.0
  # chargeback lag in real days before a label lands, warped down by time_warp_factor
  base_chargeback_lag_days: 7.0
  # fractional spread on each label's lag so they do not arrive in lockstep
  label_lag_jitter: 0.2
  # cap on any single inter-message wait so a long real-world gap cannot stall replay
  max_message_delay_seconds: 2.0
