# Dedicated identities for the serving, consumer, and monitoring pods. None call
# the Kubernetes API, so the token is not mounted and no Role is bound (least privilege).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-serving
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-consumer
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-monitoring
automountServiceAccountToken: false
