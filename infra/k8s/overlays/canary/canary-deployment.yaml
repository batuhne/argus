# Candidate taking a small slice of real traffic. serving/canary.py gates each ramp step
# (promote/hold/rollback); the weight is patched by hand (no in-cluster controller drives the ramp).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-canary
  labels:
    app: argus-serving-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argus-serving-canary
  template:
    metadata:
      labels:
        app: argus-serving-canary
        argus.io/app: serving
    spec:
      serviceAccountName: argus-serving
      # The canary takes real traffic, so it drains like stable: preStop holds while the endpoints
      # controller pulls the pod, then in-flight requests finish before the server stops.
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: serving
          image: argus-app
          imagePullPolicy: Always
          args:
            - bentoml
            - serve
            - src/fraud/serving/service.py:FraudService
            - --host=0.0.0.0
            - --port=3001
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: argus-serving-env
            - secretRef:
                name: argus-serving-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          # The server binds only after a blocking champion load, so shield liveness until then.
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["python", "-c", "import time; time.sleep(5)"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: serving-canary
  labels:
    app: argus-serving-canary
spec:
  selector:
    app: argus-serving-canary
  ports:
    - name: http
      port: 80
      targetPort: http
