# Default-deny everything, then a per-workload allow below. The data plane
# (Redis, Redpanda, MLflow, MinIO) is addressed by port here; in a real cluster
# tighten the egress peers to namespace or pod selectors.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: serving-allow
spec:
  podSelector:
    matchLabels:
      argus.io/app: serving
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Only the ingress controller (Traefik, in kube-system on k3d) reaches the predict port,
    # fronting both live and mirrored traffic. NOT probe-safe under a policy-enforcing CNI
    # (Calico, Cilium): kubelet livez/readyz come from the node, so those clusters must add a
    # node-CIDR ipBlock for port 3001. The bearer token gates predict regardless.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 3001
    # The in-cluster consumer reaches /predict pod-to-pod, not through the ingress controller.
    - from:
        - podSelector:
            matchLabels:
              argus.io/app: consumer
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: consumer-allow
spec:
  podSelector:
    matchLabels:
      argus.io/app: consumer
  policyTypes: ["Ingress", "Egress"]
  # Egress only; listing Ingress with no rules denies all inbound.
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Port 3001 is serving's pod port (the Service maps :80 to it before the policy is applied).
    - ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 9092
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitor-allow
spec:
  podSelector:
    matchLabels:
      argus.io/app: monitoring
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Prometheus scrapes the metrics port. The scraper's namespace is environment-specific, so the
    # source is left open in-cluster; tighten to the monitoring namespace under a real CNI.
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kafka (consume scored-features/labels, publish drift-alerts), MLflow (resolve the baseline
    # run), and S3/MinIO (download the baseline artifact).
    - ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 9000
