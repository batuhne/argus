name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.11"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy
      - name: Pipeline dep check
        run: uv run python scripts/check_pipeline_deps.py
      - name: Unit and data tests
        run: uv run pytest -m "not integration and not load"

  # Backstop for the gitleaks pre-commit hook when it is bypassed; scans full history.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          # sha256 of gitleaks_8.21.2_linux_x64.tar.gz; verified so a swapped release asset cannot run in CI.
          GITLEAKS_SHA256: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
        run: |
          curl -fsSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
      - name: Scan git history for secrets
        run: gitleaks detect --source=. --redact --verbose --exit-code=1
